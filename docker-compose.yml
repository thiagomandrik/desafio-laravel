services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: pgsql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - desafio-laravel

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-desafio_laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - desafio-laravel-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-testing-db.sh:/docker-entrypoint-initdb.d/init-testing-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-desafio_laravel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - desafio-laravel

volumes:
  desafio-laravel-pgdata:

networks:
  desafio-laravel:
    driver: bridge
